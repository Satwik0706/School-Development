<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Your Role</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #d0f4ff, #e9ffd9);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .welcome-banner {
            text-align: center;
            margin-bottom: 30px;
            color: #222;
        }

        .welcome-banner h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .school-name {
            font-size: 1.3rem;
            color: #00695c;
            font-weight: 600;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }

        .logout-btn:hover {
            background: #b71c1c;
        }

        h1 {
            text-align: center;
            color: #222;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 30px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .login-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            padding: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 6px solid #00a37a;
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 26px rgba(0,0,0,0.18);
        }

        .login-card h2 {
            text-align: center;
            color: #00695c;
            margin-bottom: 20px;
            font-size: 24px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
        }

        .input-box {
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 12px 40px 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #bbb;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        .input-box i {
            position: absolute;
            right: 12px;
            top: 12px;
            color: #777;
            font-size: 17px;
        }

        input:focus {
            border-color: #00a37a;
            outline: none;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #00a37a;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button[type="submit"]:hover {
            background: #00695c;
        }

        button[type="submit"]:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-bottom: 10px;
            padding: 8px;
            background: #ffebee;
            border-radius: 6px;
            display: none;
        }

        .success {
            color: #2e7d32;
            font-size: 14px;
            margin-bottom: 10px;
            padding: 8px;
            background: #e8f5e9;
            border-radius: 6px;
            display: none;
        }

        @keyframes fadeIn {
            0% {opacity: 0; transform: translateY(10px);}
            100% {opacity: 1; transform: translateY(0);}
        }

        .login-card {
            animation: fadeIn 0.7s ease-in-out;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<button class="logout-btn" onclick="logout()">
    <i class="fas fa-sign-out-alt"></i> Logout
</button>

<div class="welcome-banner">
    <h1>Welcome to</h1>
    <div class="school-name" id="schoolName">Loading...</div>
</div>

<h1>Select Your Role to Continue</h1>

<div class="grid-container">

    <!-- Admin Login -->
    <div class="login-card">
        <h2><i class="fas fa-user-shield"></i> Admin Dashboard</h2>
        <div class="error" id="adminError"></div>
        <div class="success" id="adminSuccess"></div>
        
        <form id="adminForm">
            <label for="School_Id">School ID</label>
            <div class="input-box">
                <input type="text" id="School_Id" name="School_Id" required>
                <i class="fas fa-id-card"></i>
            </div>

            <label for="School_password">School Password</label>
            <div class="input-box">
                <input type="password" id="School_password" name="School_password" required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" id="adminBtn">Go to Admin Dashboard</button>
        </form>
    </div>

    <!-- Teacher Login -->
    <div class="login-card">
        <h2><i class="fas fa-chalkboard-teacher"></i> Teacher Portal</h2>
        <div class="error" id="teacherError"></div>
        <div class="success" id="teacherSuccess"></div>
        
        <form id="teacherForm">
            <label for="Teacher_ID">Teacher ID</label>
            <div class="input-box">
                <input type="text" id="Teacher_ID" name="Teacher_ID" required 
                       placeholder="e.g., T1234567890">
                <i class="fas fa-id-badge"></i>
            </div>

            <label for="Teacher_Password">Teacher Password</label>
            <div class="input-box">
                <input type="password" id="Teacher_Password" name="Teacher_Password" required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" id="teacherBtn">Go to Teacher Portal</button>
        </form>
    </div>

    <!-- Parent & Child Login -->
    <div class="login-card">
        <h2><i class="fas fa-people-roof"></i> Student & Parent Portal</h2>
        <div class="error" id="studentError"></div>
        <div class="success" id="studentSuccess"></div>
        
        <form id="studentForm">
            <label for="Phone_number">Parent Phone Number</label>
            <div class="input-box">
                <input type="text" id="Phone_number" name="Phone_number" required 
                       placeholder="e.g., 9876543210">
                <i class="fas fa-phone"></i>
            </div>

            <label for="Student_id">Student ID</label>
            <div class="input-box">
                <input type="text" id="Student_id" name="Student_id" required
                       placeholder="e.g., S1234567890">
                <i class="fas fa-child"></i>
            </div>

            <button type="submit" id="studentBtn">Go to Student Portal</button>
        </form>
    </div>

</div>

<script>
    const API_URL = 'http://localhost:5000/api';

    // Check if user is logged in (from initial login)
    const token = localStorage.getItem('token');
    const schoolName = localStorage.getItem('schoolName');
    
    if (!token) {
        alert('Please login first!');
        window.location.href = 'project.html';
    }

    // Display school name
    if (schoolName) {
        document.getElementById('schoolName').textContent = schoolName;
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'project.html';
    }

    // Admin Form - Just verify and redirect (already logged in)
    const adminForm = document.getElementById('adminForm');
    const adminError = document.getElementById('adminError');
    const adminSuccess = document.getElementById('adminSuccess');
    const adminBtn = document.getElementById('adminBtn');

    adminForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        adminError.style.display = 'none';
        adminSuccess.style.display = 'none';
        
        const schoolId = document.getElementById('School_Id').value.trim();
        const password = document.getElementById('School_password').value;

        // If already logged in as admin, just redirect
        if (localStorage.getItem('userType') === 'admin' && localStorage.getItem('schoolId') === schoolId) {
            window.location.href = 'admin_dashboard_html_css_js_creative_prototype.html';
            return;
        }

        adminBtn.disabled = true;
        adminBtn.textContent = 'Verifying...';

        try {
            const response = await fetch(`${API_URL}/auth/login/admin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    School_Id: schoolId,
                    School_password: password
                })
            });

            // Check if response is JSON
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                throw new Error('Server error - Backend might not be running on port 5000');
            }

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Login failed');
            }

            // Update token with admin token
            localStorage.setItem('token', data.token);
            localStorage.setItem('userType', 'admin');
            localStorage.setItem('schoolId', data.schoolId);
            localStorage.setItem('schoolName', data.schoolName);
            
            adminSuccess.textContent = 'Success! Redirecting to Admin Dashboard...';
            adminSuccess.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'admin_dashboard_html_css_js_creative_prototype.html';
            }, 1000);

        } catch (error) {
            console.error('Admin login error:', error);
            adminError.textContent = error.message + ' (Make sure backend is running: cd backend && npm run dev)';
            adminError.style.display = 'block';
            adminBtn.disabled = false;
            adminBtn.textContent = 'Go to Admin Dashboard';
        }
    });

    // Teacher Form
    const teacherForm = document.getElementById('teacherForm');
    const teacherError = document.getElementById('teacherError');
    const teacherSuccess = document.getElementById('teacherSuccess');
    const teacherBtn = document.getElementById('teacherBtn');

    teacherForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        teacherError.style.display = 'none';
        teacherSuccess.style.display = 'none';
        
        const teacherId = document.getElementById('Teacher_ID').value.trim();
        const password = document.getElementById('Teacher_Password').value;

        teacherBtn.disabled = true;
        teacherBtn.textContent = 'Logging in...';

        try {
            const response = await fetch(`${API_URL}/auth/login/teacher`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Teacher_ID: teacherId,
                    Teacher_Password: password
                })
            });

            // Check if response is JSON
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                throw new Error('Server error - Backend might not be running');
            }

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Login failed');
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('userType', 'teacher');
            localStorage.setItem('teacherId', data.teacherId);
            localStorage.setItem('teacherName', data.name);
            
            teacherSuccess.textContent = `Welcome ${data.name}! Redirecting...`;
            teacherSuccess.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'teacher_modified.html';
            }, 1000);

        } catch (error) {
            console.error('Teacher login error:', error);
            teacherError.textContent = error.message;
            teacherError.style.display = 'block';
            teacherBtn.disabled = false;
            teacherBtn.textContent = 'Go to Teacher Portal';
        }
    });

    // Student Form
    const studentForm = document.getElementById('studentForm');
    const studentError = document.getElementById('studentError');
    const studentSuccess = document.getElementById('studentSuccess');
    const studentBtn = document.getElementById('studentBtn');

    studentForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        studentError.style.display = 'none';
        studentSuccess.style.display = 'none';
        
        const phone = document.getElementById('Phone_number').value.trim();
        const studentId = document.getElementById('Student_id').value.trim();

        studentBtn.disabled = true;
        studentBtn.textContent = 'Logging in...';

        try {
            const response = await fetch(`${API_URL}/auth/login/student`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    Phone_number: phone,
                    Student_id: studentId
                })
            });

            // Check if response is JSON
            const contentType = response.headers.get('content-type');
            if (!contentType || !contentType.includes('application/json')) {
                throw new Error('Server error - Backend might not be running');
            }

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Invalid credentials');
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('userType', 'student');
            localStorage.setItem('studentId', data.studentId);
            localStorage.setItem('studentName', data.name);
            
            studentSuccess.textContent = `Welcome ${data.name}! Redirecting...`;
            studentSuccess.style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'student_portal_page.html';
            }, 1000);

        } catch (error) {
            console.error('Student login error:', error);
            studentError.textContent = error.message;
            studentError.style.display = 'block';
            studentBtn.disabled = false;
            studentBtn.textContent = 'Go to Student Portal';
        }
    });

    // Check backend connection on load
    window.addEventListener('load', async () => {
        try {
            const response = await fetch(`${API_URL}/health`);
            if (!response.ok) {
                console.warn('⚠️ Backend might not be running. Start it with: cd backend && npm run dev');
            }
        } catch (error) {
            console.error('❌ Backend not reachable. Make sure to run: cd backend && npm run dev');
        }
    });
</script>

</body>
</html>
